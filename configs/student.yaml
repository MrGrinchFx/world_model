seed: 289
device: auto
torch_num_threads: 1

model:
  hidden_dim: 256
  num_layers: 3
  use_gru: true

training:
  batch_size: 128
  updates: 10000
  smoke_updates: 120
  train_sequence_length: 96       # Increased from 64 to allow a significantly longer curriculum horizon
  learning_rate: 2.0e-4           # Bumped up from 1.0e-4 to maximize early gradient exploration under your custom cosine decay
  grad_clip_norm: 1.0
  eval_every: 200
  smoke_eval_every: 20
  val_horizon: 200
  max_val_windows: 128
  checkpoint_metric: val/VPT80@0.25
  checkpoint_mode: max

loss:
  one_step_weight: 1.0
  rollout_weight: 12.0            # Slightly increased to heavily penalize multi-step drift as horizons scale
  rollout_train_horizon: 25       # Shifted starting baseline up from 15 to focus on temporal modeling from early updates

eval:
  warmup_steps: 10
  horizon: auto
  max_horizon: 1000
  report_horizons: [1, 5, 10, 90, 100, 200, 500, 1000]
  vpt_thresholds: [0.10, 0.25, 0.50]
